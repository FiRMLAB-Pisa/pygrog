version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    pre_install:
      # torch must be available in the active environment *before* building
      # the C++ extension, because CMakeLists.txt queries torch for its CMake
      # prefix path.  pip's default build isolation creates a fresh environment
      # that doesn't see the host venv, so we pre-install the build requirements
      # here and then pass --no-build-isolation when building the package.
      - pip install torch numpy scikit-build-core setuptools-scm
      - pip install --no-build-isolation .[dev-cpu]
      - python -m pip install --upgrade pip
      - pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - pip install scikit-build-core setuptools-scm cmake ninja
      - PYGROG_NO_CUDA=1 pip install --no-build-isolation -e ".[dev-cpu]"

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements.txt
