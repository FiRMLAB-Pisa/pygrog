name: Publish PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  verify-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        torch-channel: ["cpu"]
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            torch-channel: "cu126"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CUDA toolkit (Linux CUDA jobs)
        if: matrix.torch-channel != 'cpu' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-6
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH

      - name: Build and smoke-test
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core setuptools-scm
          if [ "${{ matrix.torch-channel }}" = "cpu" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
            PYGROG_NO_CUDA=1 pip install --no-build-isolation -e .
          else
            pip install torch --index-url https://download.pytorch.org/whl/${{ matrix.torch-channel }}
            PYGROG_FORCE_CUDA=1 pip install --no-build-isolation -e .
          fi
          python -c "import pygrog; print(pygrog.__version__)"

  build-dist:
    needs: verify-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install scikit-build-core setuptools-scm build
          PYGROG_NO_CUDA=1 python -m build --no-isolation
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build-dist
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/pygrog
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
