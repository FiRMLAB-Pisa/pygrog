name: Build and upload to PyPI (setuptools)

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - v*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upload_to_pypi:
        description: 'Upload to PyPI'
        required: false
        default: false
        type: boolean

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # For setuptools_scm

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cibuildwheel

    - name: Set up MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.16.2
      env:
        # Skip PyPy and 32-bit builds
        CIBW_SKIP: "pp* *-win32 *-manylinux_i686 *-musllinux_i686"
        
        # Python versions to build for
        CIBW_BUILD: "cp310-* cp311-* cp312-*"
        
        # Use stable ABI for forward compatibility
        CIBW_PROJECT_REQUIRES_PYTHON: ">=3.10"
        
        # Build settings
        CIBW_BUILD_VERBOSITY: 1
        
        # Install build dependencies in wheel environment
        CIBW_BEFORE_BUILD: |
          pip install --upgrade pip setuptools wheel
          pip install pybind11 numpy setuptools-scm
          
        # Test the built wheels
        CIBW_TEST_REQUIRES: pytest numpy
        CIBW_TEST_COMMAND: |
          python -c "import pygrog; print(f'PyGROG version: {pygrog.__version__}')"
          python -c "
          try:
              from pygrog.operator._fast_binning import fast_binning
              print('✓ C++ extension available')
          except ImportError:
              print('! Using Python fallback (C++ extension not available)')
          "
          
        # Platform-specific environment variables
        CIBW_ENVIRONMENT_LINUX: >
          CC=gcc
          CXX=g++
          
        CIBW_ENVIRONMENT_MACOS: >
          MACOSX_DEPLOYMENT_TARGET=10.15
          
        CIBW_ENVIRONMENT_WINDOWS: >
          CMAKE_GENERATOR="Visual Studio 17 2022"

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v3
      with:
        name: wheels-${{ matrix.os }}
        path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # For setuptools_scm

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools-scm pybind11 numpy

    - name: Build sdist
      run: python -m build --sdist

    - name: Upload sdist as artifact
      uses: actions/upload-artifact@v3
      with:
        name: sdist
        path: dist/*.tar.gz

  test_install:
    name: Test installation
    needs: [build_wheels, build_sdist]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Download wheel artifacts
      uses: actions/download-artifact@v3
      with:
        name: wheels-${{ matrix.os }}
        path: wheels/

    - name: Install and test wheel
      run: |
        python -m pip install --upgrade pip
        pip install wheels/*.whl
        python -c "import pygrog; print(f'PyGROG version: {pygrog.__version__}')"
        python -c "
        try:
            from pygrog.operator._fast_binning import fast_binning
            print('✓ C++ extension working correctly')
        except ImportError as e:
            print(f'! C++ extension not available: {e}')
            print('Testing Python fallback...')
            from pygrog.operator import FastBinning
            print('✓ Python fallback working correctly')
        "

  test_sdist:
    name: Test source distribution
    needs: [build_sdist]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Download sdist
      uses: actions/download-artifact@v3
      with:
        name: sdist
        path: sdist/

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pybind11 numpy setuptools-scm

    - name: Install and test sdist
      run: |
        pip install sdist/*.tar.gz
        python -c "import pygrog; print(f'PyGROG version: {pygrog.__version__}')"

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist, test_install, test_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_pypi == 'true')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: dist-artifacts/

    - name: Flatten artifacts
      run: |
        mkdir -p dist/
        find dist-artifacts/ -name "*.whl" -exec cp {} dist/ \;
        find dist-artifacts/ -name "*.tar.gz" -exec cp {} dist/ \;
        ls -la dist/

    - name: Upload to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
        verbose: true

  upload_test_pypi:
    name: Upload to Test PyPI
    needs: [build_wheels, build_sdist, test_install, test_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: dist-artifacts/

    - name: Flatten artifacts
      run: |
        mkdir -p dist/
        find dist-artifacts/ -name "*.whl" -exec cp {} dist/ \;
        find dist-artifacts/ -name "*.tar.gz" -exec cp {} dist/ \;
        ls -la dist/

    - name: Upload to Test PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        repository-url: https://test.pypi.org/legacy/
        verbose: true