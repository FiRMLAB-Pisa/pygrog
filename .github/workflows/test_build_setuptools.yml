name: Test Build (setuptools)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test_build:
    name: Test build on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # For setuptools_scm

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel pybind11 numpy setuptools-scm

    - name: Build package (with C++ extension)
      run: |
        echo "Building with C++ extension..."
        pip install -e . -v

    - name: Test C++ extension build
      run: |
        python -c "
        import sys
        print(f'Python version: {sys.version}')
        
        try:
            import pygrog
            print(f'PyGROG version: {pygrog.__version__}')
        except Exception as e:
            print(f'Failed to import pygrog: {e}')
            sys.exit(1)
            
        try:
            from pygrog.operator._fast_binning import fast_binning
            print('✓ C++ extension imported successfully')
            
            # Test basic functionality
            import numpy as np
            bins = np.zeros(10, dtype=np.complex64)
            points = np.array([1+2j], dtype=np.complex64)
            weights = np.array([0.5], dtype=np.float32)
            indices = np.array([5], dtype=np.uint64)
            
            # This would be the actual function call
            # fast_binning(bins, points, weights, indices)
            print('✓ C++ extension basic test passed')
            
        except ImportError as e:
            print(f'! C++ extension not available: {e}')
            print('Falling back to pure Python implementation')
            
            try:
                from pygrog.operator import FastBinning
                print('✓ Python fallback available')
            except ImportError as e2:
                print(f'✗ Python fallback also failed: {e2}')
                sys.exit(1)
        "

    - name: Test pure Python build
      run: |
        echo "Testing pure Python build..."
        pip uninstall -y pygrog
        PYGROG_PURE_PYTHON=1 pip install -e . -v
        python -c "
        import pygrog
        print(f'Pure Python PyGROG version: {pygrog.__version__}')
        
        try:
            from pygrog.operator._fast_binning import fast_binning
            print('! Unexpected: C++ extension available in pure Python mode')
        except ImportError:
            print('✓ C++ extension correctly disabled in pure Python mode')
            
        try:
            from pygrog.operator import FastBinning
            print('✓ Python fallback working in pure Python mode')
        except ImportError as e:
            print(f'✗ Python fallback failed: {e}')
            exit(1)
        "

  test_source_distribution:
    name: Test source distribution build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools-scm pybind11 numpy

    - name: Build source distribution
      run: python -m build --sdist

    - name: Test sdist installation
      run: |
        cd dist/
        pip install *.tar.gz
        python -c "import pygrog; print(f'PyGROG from sdist: {pygrog.__version__}')"

  test_wheel_build:
    name: Test wheel build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools-scm pybind11 numpy

    - name: Build wheel
      run: python -m build --wheel

    - name: Test wheel installation
      run: |
        cd dist/
        pip install *.whl
        python -c "
        import pygrog
        print(f'PyGROG from wheel: {pygrog.__version__}')
        try:
            from pygrog.operator._fast_binning import fast_binning
            print('✓ C++ extension available from wheel')
        except ImportError:
            print('! C++ extension not available from wheel')
        "