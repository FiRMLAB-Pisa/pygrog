name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff codespell
      - name: Ruff format check
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .
      - name: Codespell
        run: codespell .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        torch-channel: ["cpu"]
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            torch-channel: "cu126"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CUDA toolkit (Linux CUDA jobs)
        if: matrix.torch-channel != 'cpu' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-6
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core setuptools-scm
          if [ "${{ matrix.torch-channel }}" = "cpu" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
            PYGROG_NO_CUDA=1 pip install --no-build-isolation -e ".[dev-cpu]"
          else
            pip install torch --index-url https://download.pytorch.org/whl/${{ matrix.torch-channel }}
            PYGROG_FORCE_CUDA=1 pip install --no-build-isolation -e ".[dev-cpu]"
          fi

      - name: Run tests
        run: pytest -q
