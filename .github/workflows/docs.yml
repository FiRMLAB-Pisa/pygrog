name: Docs Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install scikit-build-core setuptools-scm cmake ninja
          PYGROG_NO_CUDA=1 pip install --no-build-isolation -e ".[dev-cpu]"
      - name: Build docs (strict)
        run: python -m sphinx -E -W --keep-going -b html docs docs/_build/html
