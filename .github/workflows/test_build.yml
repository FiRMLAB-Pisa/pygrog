name: Test local build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test_local_build:
    name: Test local build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        include:
          - os: ubuntu-latest
            install_deps: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build
          - os: macos-latest
            install_deps: brew install cmake ninja
          - os: windows-latest
            install_deps: choco install cmake ninja

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      if: matrix.install_deps
      run: ${{ matrix.install_deps }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install numpy scikit-build-core setuptools-scm pytest

    - name: Test editable installation
      shell: bash
      run: |
        echo "Testing: PYGROG_NO_CUDA=1 pip install --no-build-isolation -e ."
        # --no-build-isolation is required so CMake can find torch at configure time.
        PYGROG_NO_CUDA=1 pip install --no-build-isolation -e .

        python -c "
        import pygrog
        print('pygrog', pygrog.__version__, '-- import OK')
        import pygrog._pygrog_torch as _ext
        assert hasattr(_ext, 'scatter_add'), 'scatter_add missing'
        assert hasattr(_ext, 'gather'), 'gather missing'
        import torch
        grid = torch.zeros(16, dtype=torch.complex64)
        data = torch.ones(4, dtype=torch.complex64)
        idx  = torch.tensor([0, 3, 7, 12], dtype=torch.int64)
        w    = torch.ones(4)
        _ext.scatter_add(grid, data, idx, w)
        assert grid[0].real.item() > 0, 'scatter_add produced no output'
        out = _ext.gather(grid, idx, w)
        assert out.shape == (4,), f'gather shape mismatch: {out.shape}'
        print('C++ extension scatter_add + gather OK')
        "

    - name: Run tests
      run: |
        python -m pytest tests/ -v --ignore=tests/test_fast_binning.py

  # Verify that installation fails properly without a C++ compiler
  test_no_compiler_fails:
    name: Test build requires compiler
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install minimal dependencies (no C++ compiler)
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy

    - name: Verify build fails without compiler
      run: |
        # The build should fail — the C++ extension is required
        if pip install --no-build-isolation -e . 2>&1; then
          echo "ERROR: build should have failed without a C++ compiler"
          exit 1
        else
          echo "✓ Build correctly failed without compiler"
        fi