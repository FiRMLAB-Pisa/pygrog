name: Test local build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test_local_build:
    name: Test local build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
        include:
          - os: ubuntu-latest
            install_deps: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build
          - os: macos-latest
            install_deps: brew install cmake ninja
          - os: windows-latest
            install_deps: choco install cmake ninja

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      if: matrix.install_deps
      run: ${{ matrix.install_deps }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pybind11 scikit-build-core[pyproject] pytest

    - name: Test source installation (pip install .)
      shell: bash
      run: |
        echo "Testing: pip install ."
        pip install .
        
        # Test functionality
        python -c "
        from pygrog.operator import fast_binning_add_at, detect_simd_level
        print(f'✓ Installation successful, SIMD: {detect_simd_level()}')
        
        import numpy as np
        bins = np.zeros(100, dtype=np.complex64)
        points = np.random.randn(1000).astype(np.complex64)
        weights = np.random.rand(1000).astype(np.float32)
        indices = np.random.randint(0, 100, 1000, dtype=np.uint64)
        
        fast_binning_add_at(bins, points, weights, indices)
        print('✓ Basic functionality test passed')
        "
        
        # Uninstall for next test
        pip uninstall -y pygrog

    - name: Test editable installation (pip install -e .)
      shell: bash
      run: |
        echo "Testing: pip install -e ."
        pip install -e .
        
        # Test functionality
        python -c "
        from pygrog.operator import fast_binning_add_at, detect_simd_level, benchmark_binning
        print(f'✓ Editable installation successful, SIMD: {detect_simd_level()}')
        
        # Run quick benchmark
        results = benchmark_binning(n_points=5000, n_bins=500, num_runs=3)
        print(f'✓ Benchmark completed successfully')
        if 'speedup' in results:
            print(f'  Speedup vs numpy: {results[\"speedup\"]:.1f}x')
        "

    - name: Run tests
      run: |
        python -m pytest tests/test_fast_binning.py -v
        python examples/fast_binning_example.py

  # Test fallback behavior when C++ compilation fails
  test_fallback:
    name: Test Python fallback
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install minimal dependencies (no C++ compiler)
      run: |
        python -m pip install --upgrade pip
        pip install numpy

    - name: Test fallback installation
      run: |
        # This should install without the C++ extension
        pip install -e . || echo "Expected to fail, testing fallback..."
        
        # Test that Python fallback works
        python -c "
        try:
            from pygrog.operator import fast_binning_add_at
            print('Module imported successfully')
            
            import numpy as np
            bins = np.zeros(10, dtype=np.complex64)
            points = np.array([1+2j], dtype=np.complex64)
            weights = np.array([0.5], dtype=np.float32)
            indices = np.array([5], dtype=np.uint64)
            
            fast_binning_add_at(bins, points, weights, indices)
            assert abs(bins[5] - (0.5 + 1j)) < 1e-6
            print('✓ Python fallback working correctly')
        except Exception as e:
            print(f'✗ Fallback test failed: {e}')
            exit(1)
        "