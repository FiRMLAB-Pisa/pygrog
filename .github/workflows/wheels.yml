name: Build and publish CPU wheels

# CPU-only wheels → PyPI (manylinux, macOS, Windows).
# CUDA wheels are handled by wheels_cuda.yml → GitHub Releases.

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── CPU wheels ─────────────────────────────────────────────────────────────
  build_wheels:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            arch: x86_64
          - name: Linux aarch64
            os: ubuntu-latest
            arch: aarch64
          - name: macOS x86_64
            os: macos-13
            arch: x86_64
          - name: macOS arm64
            os: macos-14
            arch: arm64
          - name: Windows x86_64
            os: windows-latest
            arch: AMD64

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # required for setuptools_scm

    - name: Set up QEMU (Linux aarch64 emulation)
      if: matrix.arch == 'aarch64'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: pip install cibuildwheel==2.22.0

    - name: Build wheels
      env:
        CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
        CIBW_ARCHS: ${{ matrix.arch }}
        CIBW_SKIP: "pp* *-musllinux*"

        # Disable build isolation so torch installed below is visible to CMake.
        CIBW_BUILD_FRONTEND: "pip; args: --no-build-isolation"

        # Install CPU-only torch + all build tools before compiling.
        CIBW_BEFORE_BUILD: >-
          pip install --upgrade pip &&
          pip install torch --index-url https://download.pytorch.org/whl/cpu &&
          pip install scikit-build-core setuptools-scm cmake ninja

        # Force CPU-only build in CMake.
        CIBW_ENVIRONMENT: "PYGROG_NO_CUDA=1"
        CIBW_ENVIRONMENT_MACOS: "PYGROG_NO_CUDA=1 MACOSX_DEPLOYMENT_TARGET=12.0"
        CIBW_ENVIRONMENT_WINDOWS: "PYGROG_NO_CUDA=1"

        # Smoke-test: import the package and verify the C++ extension loaded.
        CIBW_TEST_COMMAND: >-
          python -c "import pygrog._pygrog_torch as e; assert hasattr(e, 'scatter_add'), 'C++ extension missing scatter_add'; import pygrog; print('pygrog', pygrog.__version__, '-- OK')"

        # Repair wheels for manylinux / delocate on macOS.
        # Exclude torch's shared libraries: they are already in the user's torch
        # installation and must NOT be vendored into the pygrog wheel.
        CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
          auditwheel repair
          --exclude libtorch.so
          --exclude libtorch_cpu.so
          --exclude libtorch_python.so
          --exclude libc10.so
          -w {dest_dir} {wheel}
        CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
          delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

      run: cibuildwheel --output-dir wheelhouse

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-cpu-${{ matrix.os }}-${{ matrix.arch }}
        path: wheelhouse/*.whl

  # ── Source distribution ────────────────────────────────────────────────────
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: pip install build setuptools-scm
    - run: python -m build --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  # ── Publish to PyPI ────────────────────────────────────────────────────────
  publish:
    name: Publish CPU wheels + sdist to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/p/pygrog
    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: 'wheels-cpu-*'
        path: dist
        merge-multiple: true

    - uses: actions/download-artifact@v4
      with:
        name: sdist
        path: dist

    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
        verify-metadata: true
        print-hash: true