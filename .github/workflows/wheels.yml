name: Build and publish Python wheels

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build wheels for different platforms and architectures
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            arch: x86_64
            build: "cp310-* cp311-* cp312-*"
            
          # Linux aarch64 (ARM64)
          - os: ubuntu-latest
            arch: aarch64
            build: "cp310-* cp311-* cp312-*"
            
          # macOS Intel
          - os: macos-13  # Intel runner
            arch: x86_64
            build: "cp310-* cp311-* cp312-*"
            
          # macOS Apple Silicon
          - os: macos-14  # ARM64 runner
            arch: arm64
            build: "cp310-* cp311-* cp312-*"
            
          # Windows x86_64
          - os: windows-latest
            arch: AMD64
            build: "cp310-* cp311-* cp312-*"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for setuptools_scm

    - name: Set up QEMU (for ARM64 emulation on Linux)
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'aarch64'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    # No CMake/Ninja needed — extension is built via torch.utils.cpp_extension

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install cibuildwheel
      run: python -m pip install cibuildwheel==2.16.2

    - name: Build wheels
      env:
        CIBW_BUILD: ${{ matrix.build }}
        CIBW_ARCHS: ${{ matrix.arch }}
        
        # Skip PyPy and musl for now (can add later if needed)
        CIBW_SKIP: "pp* *-musllinux*"
        
        # Install build dependencies (torch is needed for cpp_extension)
        CIBW_BEFORE_BUILD: >
          pip install torch numpy setuptools wheel
        
        # Test the built wheels
        CIBW_TEST_REQUIRES: pytest numpy
        CIBW_TEST_COMMAND: >
          python -c "
          try:
              from pygrog.operator import fast_binning_add_at, detect_simd_level;
              print(f'✓ Import successful, SIMD: {detect_simd_level()}');
              import numpy as np;
              bins = np.zeros(10, dtype=np.complex64);
              points = np.array([1+2j], dtype=np.complex64);
              weights = np.array([0.5], dtype=np.float32);
              indices = np.array([5], dtype=np.uint64);
              fast_binning_add_at(bins, points, weights, indices);
              assert abs(bins[5] - (0.5 + 1j)) < 1e-6;
              print('✓ Functionality test passed')
          except Exception as e:
              print(f'✗ Test failed: {e}');
              exit(1)
          "
        
        # Platform-specific settings
        CIBW_ENVIRONMENT_MACOS: >
          MACOSX_DEPLOYMENT_TARGET=10.15
        
        # Repair wheels for better compatibility
        CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel}"
        CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"
        
      run: python -m cibuildwheel --output-dir wheelhouse

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v3
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.arch }}
        path: ./wheelhouse/*.whl

  # Build source distribution
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools_scm

    - name: Build source distribution
      run: python -m build --sdist

    - name: Upload sdist as artifact
      uses: actions/upload-artifact@v3
      with:
        name: sdist
        path: dist/*.tar.gz

  # Test installation from wheels
  test_wheels:
    name: Test wheel installation
    needs: [build_wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Download wheels
      uses: actions/download-artifact@v3
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.os == 'ubuntu-latest' && 'x86_64' || (matrix.os == 'windows-latest' && 'AMD64' || 'x86_64') }}
        path: wheels/

    - name: Install and test wheel
      shell: bash
      run: |
        # Find the wheel for current Python version
        wheel=$(ls wheels/*cp$(echo ${{ matrix.python-version }} | tr -d '.')*whl | head -1)
        if [ -z "$wheel" ]; then
          echo "No wheel found for Python ${{ matrix.python-version }}"
          exit 1
        fi
        
        echo "Installing wheel: $wheel"
        pip install "$wheel"
        
        # Test import and basic functionality
        python -c "
        from pygrog.operator import fast_binning_add_at, detect_simd_level, benchmark_binning
        print(f'SIMD level: {detect_simd_level()}')
        
        # Quick benchmark
        results = benchmark_binning(n_points=1000, n_bins=100, num_runs=3, compare_numpy=True)
        if 'speedup' in results:
            print(f'Speedup: {results[\"speedup\"]:.1f}x')
        else:
            print('Benchmark completed (no speedup comparison)')
        print('✓ All tests passed')
        "

  # Publish to PyPI
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist, test_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/p/pygrog
    permissions:
      id-token: write  # For trusted publishing

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: dist

    - name: Flatten artifacts
      run: |
        mkdir -p upload
        find dist -name "*.whl" -exec cp {} upload/ \;
        find dist -name "*.tar.gz" -exec cp {} upload/ \;
        ls -la upload/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: upload/
        verify-metadata: true
        print-hash: true

  # Publish to TestPyPI for testing
  publish_test:
    name: Publish to TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pygrog

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: dist

    - name: Flatten artifacts
      run: |
        mkdir -p upload
        find dist -name "*.whl" -exec cp {} upload/ \;
        find dist -name "*.tar.gz" -exec cp {} upload/ \;
        ls -la upload/

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        packages-dir: upload/
        verify-metadata: true